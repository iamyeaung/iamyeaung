name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *" # Runs everyday at midnight
  workflow_dispatch: # Allows manual trigger

jobs:
  generate-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_TOKEN }}

      - name: Generate Main Stats SVG
        uses: stats-organization/github-readme-stats-action@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          path: stats.svg
          card: stats
          options: "username=iamyeaung&show_icons=true&theme=tokyonight&hide_border=true&bg_color=0D1117&count_private=true"
          
      - name: Generate Top Languages SVG
        uses: stats-organization/github-readme-stats-action@v2
        with:
          token: ${{ secrets.GH_TOKEN }}
          path: top-langs.svg
          card: top-langs
          options: "username=iamyeaung&layout=compact&theme=tokyonight&hide_border=true&bg_color=0D1117"

      - name: Commit & Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stats.svg top-langs.svg
          git commit -m "docs: auto-update github stats [skip ci]" || exit 0
          git push
